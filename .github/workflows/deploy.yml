name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Verify built IndexNow key
        run: npm run verify:indexnow -- --build-dir build

      - name: Scan public artifact for private content
        run: |
          set -euo pipefail

          PRIVATE_PATHS=$(find build -type f \( -path '*/internal/*' -o -name '*.map' \) -print)
          if [ -n "$PRIVATE_PATHS" ]; then
            echo "Private paths or source maps found in the public artifact:"
            echo "$PRIVATE_PATHS"
            exit 1
          fi

          PRIVATE_REPO_MARKER='second'"-brain"
          PRIVATE_WORK_MARKER='\\.codex'"-work"
          INTERNAL_DOCS_MARKER='docs/'"internal"
          LOCAL_HOME_MARKER='/'"Users/[[:alnum:]_.-]+/"
          PRIVATE_MARKER_PATTERN="${PRIVATE_REPO_MARKER}|${PRIVATE_WORK_MARKER}|${INTERNAL_DOCS_MARKER}|${LOCAL_HOME_MARKER}"

          PRIVATE_MARKERS=$(grep -RIlE \
            --include='*.html' \
            --include='*.js' \
            --include='*.json' \
            --include='*.xml' \
            --include='*.txt' \
            --include='*.yaml' \
            --include='*.yml' \
            "$PRIVATE_MARKER_PATTERN" \
            build || true)
          if [ -n "$PRIVATE_MARKERS" ]; then
            echo "Private repository or local-path markers found in the public artifact:"
            echo "$PRIVATE_MARKERS"
            exit 1
          fi

          echo "Public artifact privacy scan passed"

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify production IndexNow key
        run: npm run verify:indexnow -- --production https://examples.expanso.io

name: AI Artifact Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Scan for AI Artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for AI artifact files
        run: |
          echo "Scanning for AI artifact files..."
          FOUND=0

          # Check for AI artifact file patterns
          while IFS= read -r -d '' file; do
            echo "❌ AI artifact file found: $file"
            FOUND=1
          done < <(find . \
            -not -path './.git/*' \
            \( \
              -name 'CLAUDE.md' \
              -o -name '*.claude.md' \
              -o -name '*HANDOFF*.md' \
              -o -name 'refactoring_plan.txt' \
              -o -name 'CIRCUIT_BREAKERS*.md' \
              -o -name '*_REARCHITECTURE_*.md' \
              -o -name 'phase*.claude.md' \
            \) \
            -print0)

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Remove AI planning/handoff files before merging."
            exit 1
          fi

          echo "✅ No AI artifact files found"

      - name: Scan PR diff for AI language patterns
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Scanning diff for AI language patterns..."

          # Get the diff of added lines only (lines starting with +, excluding the +++ header)
          DIFF=$(git diff "$BASE_SHA".."$HEAD_SHA" -- \
            '*.md' '*.mdx' '*.txt' '*.yaml' '*.yml' '*.json' '*.ts' '*.tsx' '*.js' \
            ':!.github/workflows/*.yml' \
            ':!.github/workflows/*.yaml' \
            | grep '^+' | grep -v '^+++' || true)

          # Broad editorial patterns can be legitimate identifiers or JSX props
          # in source code, so keep those checks scoped to prose and data files.
          PROSE_DIFF=$(git diff "$BASE_SHA".."$HEAD_SHA" -- \
            '*.md' '*.mdx' '*.txt' '*.yaml' '*.yml' '*.json' \
            ':!.github/workflows/*.yml' \
            ':!.github/workflows/*.yaml' \
            | grep '^+' | grep -v '^+++' || true)

          FOUND=0

          check_pattern() {
            local pattern="$1"
            local description="$2"
            local matches
            matches=$(echo "$DIFF" | grep -in "$pattern" || true)
            if [ -n "$matches" ]; then
              echo "❌ Found AI artifact pattern — $description:"
              echo "$matches" | head -5
              FOUND=1
            fi
          }

          check_prose_pattern() {
            local pattern="$1"
            local description="$2"
            local matches
            matches=$(echo "$PROSE_DIFF" | grep -in "$pattern" || true)
            if [ -n "$matches" ]; then
              echo "❌ Found AI artifact pattern — $description:"
              echo "$matches" | head -5
              FOUND=1
            fi
          }

          check_pattern "as an ai" "AI self-identification"
          check_pattern "as a large language model" "AI self-identification"
          check_pattern "i'd be happy to" "AI filler phrase"
          check_pattern "i would be happy to" "AI filler phrase"
          check_pattern "certainly!" "AI filler phrase"
          check_pattern "of course!" "AI filler phrase"
          check_pattern "generated by claude" "AI attribution"
          check_pattern "generated by chatgpt" "AI attribution"
          check_pattern "generated by gpt" "AI attribution"
          check_pattern "# TODO: " "Unresolved TODO comment"
          check_pattern "# FIXME: " "Unresolved FIXME comment"
          check_prose_pattern "placeholder" "Placeholder content"
          check_prose_pattern "\[Insert " "Unfilled template placeholder"
          check_prose_pattern "\[Add " "Unfilled template placeholder"
          check_prose_pattern "lorem ipsum" "Lorem ipsum placeholder text"

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Clean up AI artifacts and placeholder content before merging."
            exit 1
          fi

          echo "✅ No AI language patterns found in diff"

      - name: Scan tracked files for private markers
        run: |
          set -euo pipefail

          # Assemble markers from fragments so this workflow is scanned without
          # matching the guard strings that define the scan itself.
          PRIVATE_REPO_MARKER='second'"-brain"
          PRIVATE_WORK_MARKER='.codex'"-work"
          LOCAL_USER_MARKER='/'"Users/"
          CUSTOMER_TRANSCRIPT_MARKER='customer '"transcript"
          PRIVATE_CUSTOMER_MARKER='private '"customer"
          FOUND=0

          check_tree_pattern() {
            local pattern="$1"
            local description="$2"
            local matches
            matches=$(git grep -n -I -i -F -- "$pattern" -- . || true)
            if [ -n "$matches" ]; then
              echo "❌ Found private marker — $description:"
              echo "$matches" | head -5
              FOUND=1
            fi
          }

          check_tree_pattern "$PRIVATE_REPO_MARKER" "Private research repository reference"
          check_tree_pattern "$PRIVATE_WORK_MARKER" "Private working-directory reference"
          check_tree_pattern "$LOCAL_USER_MARKER" "Local absolute user path"
          check_tree_pattern "$CUSTOMER_TRANSCRIPT_MARKER" "Customer evidence marker"
          check_tree_pattern "$PRIVATE_CUSTOMER_MARKER" "Customer evidence marker"

          if [ "$FOUND" -eq 1 ]; then
            echo "Remove private markers from tracked files before merging."
            exit 1
          fi

          echo "✅ No private markers found in tracked text files"

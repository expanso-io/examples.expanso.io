name: Interactive Scaffold Inventory

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*-full.stages.ts'
      - 'docs/**/*.mdx'
      - 'scripts/check-example-health.ts'
      - 'scripts/generate-coverage-report.ts'
      - '.github/workflows/example-health.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**/*-full.stages.ts'
      - 'docs/**/*.mdx'
      - 'scripts/check-example-health.ts'
      - 'scripts/generate-coverage-report.ts'
      - '.github/workflows/example-health.yml'
  schedule:
    # Run daily at 9am UTC to track progress
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  health-check:
    name: Check Required Scaffold Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run health check
        id: health
        continue-on-error: true
        run: |
          set +e
          npm run check-health > health-output.txt 2>&1
          HEALTH_STATUS=$?
          set -e
          cat health-output.txt

          # Extract structural metrics for the PR summary.
          TOTAL=$(grep "Total Scaffolds:" health-output.txt | head -1 | awk '{print $NF}' || echo "0")
          COMPLETE=$(grep "Required Files Present:" health-output.txt | head -1 | awk '{print $NF}' || echo "0")
          PARTIAL=$(grep "Partial File Sets (50-99%):" health-output.txt | head -1 | awk '{print $NF}' || echo "0")
          MINIMAL=$(grep "Minimal File Sets (<50%):" health-output.txt | head -1 | awk '{print $NF}' || echo "0")
          AVG=$(grep "Average File Coverage:" health-output.txt | head -1 | awk '{print $NF}' | tr -d '%' || echo "0")

          {
            echo "total=${TOTAL}"
            echo "complete=${COMPLETE}"
            echo "partial=${PARTIAL}"
            echo "minimal=${MINIMAL}"
            echo "average=${AVG}"
          } >> "$GITHUB_OUTPUT"

          exit "$HEALTH_STATUS"

      - name: Generate coverage report
        run: |
          npm run coverage-report -- --output COVERAGE.md

      - name: Upload coverage report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: COVERAGE.md
          retention-days: 30

      - name: Comment on PR with scaffold status
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const total = '${{ steps.health.outputs.total }}';
            const complete = '${{ steps.health.outputs.complete }}';
            const partial = '${{ steps.health.outputs.partial }}';
            const minimal = '${{ steps.health.outputs.minimal }}';
            const average = '${{ steps.health.outputs.average }}';

            // Determine emoji based on average completion
            let emoji = '❌';
            if (average >= 90) emoji = '🎉';
            else if (average >= 75) emoji = '✅';
            else if (average >= 50) emoji = '⚠️';

            // Generate progress bar
            const barLength = 20;
            const filled = Math.round((average / 100) * barLength);
            const progressBar = '█'.repeat(filled) + '░'.repeat(barLength - filled);

            let comment = `${emoji} **Interactive Scaffold File Inventory**\n\n`;
            comment += `This gate covers stage-backed interactive scaffolds in four original categories. It verifies four required files only; it does not assess every published example, runtime behavior, content quality, or production readiness.\n\n`;
            comment += `### Structural Statistics\n\n`;
            comment += `- **Scaffolds discovered:** ${total}\n`;
            comment += `- **All required files present:** ${complete}\n`;
            comment += `- **Partial file sets (50-99%):** ${partial}\n`;
            comment += `- **Minimal file sets (<50%):** ${minimal}\n`;
            comment += `- **Average required-file coverage:** ${average}%\n\n`;
            comment += `### File Coverage\n\n`;
            comment += `\`\`\`\n${progressBar} ${average}%\n\`\`\`\n\n`;

            if (average < 100) {
              comment += `### Action Items\n\n`;
              comment += `Some discovered scaffolds are missing required files. Run \`npm run check-health\` locally for details.\n\n`;
            } else {
              comment += `### Structural Status\n\n`;
              comment += `All discovered stage-backed scaffolds contain the four required files.\n\n`;
            }

            comment += `<details>\n`;
            comment += `<summary>View full coverage report</summary>\n\n`;

            if (fs.existsSync('COVERAGE.md')) {
              const coverage = fs.readFileSync('COVERAGE.md', 'utf8');
              comment += `\n${coverage}\n`;
            }

            comment += `</details>\n\n`;
            comment += `---\n`;
            comment += `*This structural check runs automatically on relevant PRs. Download the full report from the workflow artifacts.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Report structural coverage metric (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Calculating structural file coverage..."
          AVG="${{ steps.health.outputs.average }}"
          COLOR="red"

          if [ "$AVG" -ge 90 ]; then COLOR="brightgreen"; fi
          if [ "$AVG" -ge 75 ] && [ "$AVG" -lt 90 ]; then COLOR="green"; fi
          if [ "$AVG" -ge 50 ] && [ "$AVG" -lt 75 ]; then COLOR="yellow"; fi
          if [ "$AVG" -ge 25 ] && [ "$AVG" -lt 50 ]; then COLOR="orange"; fi

          echo "Metric: scaffold-file-coverage-${AVG}%-${COLOR}"
          echo "Required-file coverage: ${AVG}%"

      - name: Enforce scaffold file contract
        if: always()
        run: |
          if [ "${{ steps.health.outcome }}" != "success" ]; then
            echo "Interactive scaffold inventory failed. Review the health step output."
            exit 1
          fi

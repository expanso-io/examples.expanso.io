name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate showcased job with Expanso CLI v2.1.19
        env:
          EXPANSO_DISABLEANALYTICS: 'true'
          EXPANSO_INSTALL_DIR: ${{ runner.temp }}/expanso-bin
          USE_SUDO: 'false'
        run: |
          set -euo pipefail

          INSTALLER="${RUNNER_TEMP}/install-expanso-cli.sh"
          curl --fail --location --silent --show-error \
            https://get.expanso.io/cli/install.sh \
            --output "${INSTALLER}"
          bash "${INSTALLER}" --version v2.1.19

          CLI="${EXPANSO_INSTALL_DIR}/expanso-cli"
          "${CLI}" version | grep -F 'v2.1.19'
          "${CLI}" job validate \
            examples/getting-started/quickstart-complete.yaml \
            --offline

      - name: Type check
        run: npm run typecheck -- --noEmit

      - name: Test privacy-safe analytics contract
        run: npm run test-analytics

      - name: Build
        run: npm run build

      - name: Verify built IndexNow key
        run: npm run verify:indexnow -- --build-dir build

      - name: Validate llms.txt
        run: node scripts/validate-llms.mjs

      - name: Scan public artifact for private content
        run: |
          set -euo pipefail

          PRIVATE_PATHS=$(find build -type f \( -path '*/internal/*' -o -name '*.map' \) -print)
          if [ -n "$PRIVATE_PATHS" ]; then
            echo "Private paths or source maps found in the public artifact:"
            echo "$PRIVATE_PATHS"
            exit 1
          fi

          PRIVATE_REPO_MARKER='second'"-brain"
          PRIVATE_WORK_MARKER='\\.codex'"-work"
          INTERNAL_DOCS_MARKER='docs/'"internal"
          LOCAL_HOME_MARKER='/'"Users/[[:alnum:]_.-]+/"
          PRIVATE_MARKER_PATTERN="${PRIVATE_REPO_MARKER}|${PRIVATE_WORK_MARKER}|${INTERNAL_DOCS_MARKER}|${LOCAL_HOME_MARKER}"

          PRIVATE_MARKERS=$(grep -RIlE \
            --include='*.html' \
            --include='*.js' \
            --include='*.json' \
            --include='*.xml' \
            --include='*.txt' \
            --include='*.yaml' \
            --include='*.yml' \
            "$PRIVATE_MARKER_PATTERN" \
            build || true)
          if [ -n "$PRIVATE_MARKERS" ]; then
            echo "Private repository or local-path markers found in the public artifact:"
            echo "$PRIVATE_MARKERS"
            exit 1
          fi

          echo "Public artifact privacy scan passed"

      - name: Check build output
        run: |
          if [ ! -d "build" ]; then
            echo "Build directory not found"
            exit 1
          fi
          echo "Build succeeded — $(find build -type f | wc -l) files"

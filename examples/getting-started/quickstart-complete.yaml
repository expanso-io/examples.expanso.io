name: examples-quickstart
type: pipeline
description: Minimal file-to-stdout pipeline for validating the current Expanso job specification.
namespace: default
labels:
  example: quickstart

# Replace this value with a label present on the node that should run the job.
selector:
  match_labels:
    environment: replace-with-node-label

config:
  input:
    file:
      paths:
        - /tmp/expanso-quickstart/input.jsonl
      codec: lines

  pipeline:
    processors: []

  output:
    stdout:
      codec: lines

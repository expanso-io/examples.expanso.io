name: scada-edge-complete
type: pipeline
description: Parse synthetic adapter-decoded register records, retain nonzero adapter statuses, add review labels, and route the result.
namespace: examples
labels:
  category: integrations
  pattern: scada-edge-processing
  industry: energy

config:
  input:
    socket:
      network: tcp
      address: 0.0.0.0:4195
      codec: lines

  pipeline:
    processors:
      - mapping: |
          let fields = content().string().split(";").fold({}, (acc, item) -> {
            let parts = item.split("=")
            acc | { parts[0]: parts[1] }
          })
          let reg = fields.REG.number()
          let val = fields.VAL.number()

          root.voltage_kv = if reg == 40001 { val / 100.0 } else { deleted() }
          root.current_a = if reg == 40003 { val / 10.0 } else { deleted() }
          root.frequency_hz = if reg == 40005 { val / 100.0 } else { deleted() }
          root.temp_c = if reg == 40007 { val / 10.0 } else { deleted() }
          root.power_mw = if reg == 40009 { val / 10.0 } else { deleted() }
          root.device_id = fields.DEVICE
          root.register = reg
          root.raw_value = val
          root.source_unit = fields.UNIT
          root.adapter_status = fields.STATUS.number()
          root."@timestamp" = fields.TS.number()

      - mapping: |
          if this.adapter_status == 0 {
            root = deleted()
          }

      - mapping: |
          root.review_class = match {
            this.adapter_status == 2 => "status-2"
            this.adapter_status == 1 => "status-1"
            _ => "unclassified-status"
          }
          root.pipeline_version = "1.0.0"

  output:
    broker:
      outputs:
        - kafka:
            addresses: ['${KAFKA_BROKERS:localhost:9092}']
            topic: '${KAFKA_TOPIC:scada-review-events}'
        - file:
            path: '${LOCAL_ARCHIVE_PATH:/tmp/scada-review-events.jsonl}'
            codec: lines

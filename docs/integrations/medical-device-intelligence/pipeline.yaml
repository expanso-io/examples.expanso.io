# Medical Device Field Report Intelligence Pipeline
#
# Illustrates reading synthetic maintenance logs, error events, and
# technician notes at a remote site. A custom Python command reloads the
# fixture files and produces candidate review JSON. Expanso then writes
# a local copy and forwards the same output to a fleet endpoint.

input:
  broker:
    inputs:
      # Source 1: Structured maintenance logs (CSV)
      - csv:
          paths:
            [
              '../../../examples/integrations/medical-device-intelligence/maintenance-logs.csv',
            ]
          parse_header_row: true
          batch_count: 0 # read all rows
        processors:
          - mapping: |
              root.source = "maintenance_log"
              root.device_id = this.device_id
              root.timestamp = this.timestamp
              root.data = this

      # Source 2: Device error events (JSON)
      - file:
          paths:
            [
              '../../../examples/integrations/medical-device-intelligence/error-events.json',
            ]
          codec: all-bytes
        processors:
          - mapping: |
              root.source = "error_events"
              root.data = this.parse_json()

      # Source 3: Freeform technician notes (text)
      - file:
          paths:
            [
              '../../../examples/integrations/medical-device-intelligence/technician-notes.txt',
            ]
          codec: all-bytes
        processors:
          - mapping: |
              root.source = "technician_notes"
              root.data = content()

pipeline:
  processors:
    # --- Stage 1: Tag each input message ---
    # This mapping does not create a multi-source batch. The custom analyzer
    # below independently reloads all three checked-in fixture files.
    - mapping: |
        root = this
        meta batch_id = "BATCH-" + now().format_timestamp("20060102-1504")
        meta site = "Synthetic lab"

    # --- Stage 2: Invoke custom analysis code ---
    # analyze_reports.py owns fixture loading, optional Claude access, and
    # the authored mock response used when credentials are absent.
    - command:
        name: python3
        args:
          - './scripts/analyze_reports.py'

    # --- Stage 3: Shape the output ---
    # Ensure consistent structure for downstream consumers
    - mapping: |
        root = this.parse_json()
        root.pipeline_version = "1.0.0"
        root.processed_at = now()

output:
  broker:
    pattern: fan_out
    outputs:
      # Output 1: Write a local review copy
      - file:
          path: './output/review-candidates.json'
          codec: lines

      # Output 2: Forward the same candidate JSON to a fleet endpoint
      - http_client:
          url: 'http://localhost:8089/api/v1/review-candidates'
          verb: POST
          headers:
            Content-Type: application/json
          max_in_flight: 1
          retries: 3
          backoff:
            initial_interval: 1s
            max_interval: 10s
